name: Update Lichess Ratings

on:
  schedule:
    - cron: '5 * * * *'   # stündlich, 5 Minuten nach der vollen Stunde
  workflow_dispatch:        # manuell auslösbar via GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create docs directory if missing
        run: mkdir -p docs

      - name: Run Lichess tracker
        run: python lichess_tracker.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html werte.json
          git diff --staged --quiet \
            && echo "Keine Änderungen." \
            || (git commit -m "chore: update ratings $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
